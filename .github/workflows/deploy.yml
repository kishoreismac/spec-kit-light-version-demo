name: App Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Azure Infra"]
    types: [completed]

permissions:
  id-token: write
  contents: read

env:
  APP_URL: ${{ secrets.APP_URL }}

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codebase
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: codebase/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Upload static site to Azure Storage
        run: |
          az storage blob upload-batch \
            --account-name "$AZURE_STORAGE_ACCOUNT" \
            --auth-mode login \
            --destination '$web' \
            --source out \
            --overwrite
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}

  monitoring-check:
    runs-on: ubuntu-latest
    needs: deploy
    env:
      APP_URL: ${{ secrets.APP_URL }}
    steps:
      - name: Verify home page
        run: |
          if [ -n "$APP_URL" ]; then
            curl --fail --silent --show-error "$APP_URL/" > /dev/null
          else
            echo "APP_URL not set; skipping home page check."
          fi
      - name: Verify catalog page
        run: |
          if [ -n "$APP_URL" ]; then
            curl --fail --silent --show-error "$APP_URL/catalog" > /dev/null
          else
            echo "APP_URL not set; skipping catalog page check."
          fi
