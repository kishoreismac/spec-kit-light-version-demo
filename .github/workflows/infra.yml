name: Infrastructure Provisioning

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/infra.yml'
      - 'infra/**'

permissions:
  contents: read
  id-token: write

jobs:
  provision:
    runs-on: ubuntu-latest
    outputs:
      site_url: ${{ steps.output_site.outputs.site_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AZURE_CLIENT_ID }}"
          test -n "${{ secrets.AZURE_TENANT_ID }}"
          test -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: |
          az group create --name "${{ vars.AZURE_RESOURCE_GROUP }}" --location "${{ vars.AZURE_LOCATION }}"

      - name: Ensure storage account for static website
        run: |
          az storage account create \
            --name "${{ vars.AZURE_STORAGE_ACCOUNT }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --location "${{ vars.AZURE_LOCATION }}" \
            --sku Standard_LRS \
            --kind StorageV2

      - name: Enable static website hosting
        run: |
          az storage blob service-properties update \
            --account-name "${{ vars.AZURE_STORAGE_ACCOUNT }}" \
            --static-website \
            --index-document index.html \
            --404-document index.html

      - name: Resolve storage website endpoint
        id: output_site
        run: |
          endpoint=$(az storage account show \
            --name "${{ vars.AZURE_STORAGE_ACCOUNT }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query "primaryEndpoints.web" -o tsv)
          echo "site_url=$endpoint" >> "$GITHUB_OUTPUT"

      - name: Set repository variable SITE_URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh variable set SITE_URL --body "${{ steps.output_site.outputs.site_url }}"

      - name: Summary
        run: |
          echo "Provisioned static hosting endpoint: ${{ steps.output_site.outputs.site_url }}"
