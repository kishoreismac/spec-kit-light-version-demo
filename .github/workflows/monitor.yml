name: Monitor Site Availability

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - name: Validate target URL
        run: |
          test -n "$SITE_URL"
      - name: Check Home
        run: |
          curl -fS "$SITE_URL/" > /dev/null
      - name: Check Catalog
        run: |
          curl -fS "$SITE_URL/catalog/" > /dev/null
